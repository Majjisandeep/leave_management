<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Leave Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .approve {
            background-color: #4CAF50;
        }
        .reject {
            background-color: #f44336;
        }
        button {
            padding: 8px 16px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .approve:hover {
            background-color: #45a049;
        }
        .reject:hover {
            background-color: #da190b;
        }
        .logout {
            float: right;
            background-color: #f44336;
        }
        .status-pending {
            color: #ff9800;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-buttons">
            <button class="logout" onclick="logout()">Logout</button>
            <button class="export-btn pdf" onclick="exportToPDF()">Export to PDF</button>
            <button class="export-btn excel" onclick="exportToExcel()">Export to Excel</button>
        </div>
        
        <!-- User Management Section -->
        <div class="section">
            <h2>User Management</h2>
            <form id="createUserForm">
                <div class="form-group">
                    <label for="newUsername">Username:</label>
                    <input type="text" id="newUsername" required>
                </div>
                <div class="form-group">
                    <label for="newPassword">Password:</label>
                    <input type="password" id="newPassword" required>
                </div>
                <button type="submit" class="create-user">Create User</button>
            </form>
            <div id="userError" class="error"></div>
            
            <table class="user-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Leave Balance</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersList"></tbody>
            </table>
        </div>

        <!-- Leave Applications Section -->
        <div class="section">
            <h2>Pending Leave Applications</h2>
            <table>
                <thead>
                    <tr>
                        <th>Employee</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Reason</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="pendingLeaves"></tbody>
            </table>
        </div>
    </div>

    <style>
        .section {
            margin-bottom: 40px;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .user-table {
            margin-top: 20px;
        }
        #createUserForm {
            max-width: 400px;
            margin-bottom: 20px;
        }
        .create-user {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .create-user:hover {
            background-color: #45a049;
        }
        .delete-user {
            background-color: #f44336;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .delete-user:hover {
            background-color: #da190b;
        }
    </style>

    <style>
        .header-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }
        .export-btn {
            padding: 8px 16px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .export-btn.pdf {
            background-color: #2196F3;
        }
        .export-btn.excel {
            background-color: #4CAF50;
        }
        .export-btn:hover {
            opacity: 0.9;
        }
    </style>

    <script>
        // Export functions
        function exportToPDF() {
            window.location.href = '/auth/export-pdf';
        }

        function exportToExcel() {
            window.location.href = '/auth/export-excel';
        }

        // Fetch all users
        async function fetchUsers() {
            try {
                const response = await fetch('/auth/users');
                if (response.ok) {
                    const users = await response.json();
                    const tbody = document.getElementById('usersList');
                    tbody.innerHTML = users
                        .filter(user => !user.isAdmin) // Don't show admin users
                        .map(user => `
                            <tr>
                                <td>${user.username}</td>
                                <td>${user.casualLeaveBalance}</td>
                                <td>
                                    <button class="delete-user" onclick="deleteUser('${user._id}')">Delete</button>
                                </td>
                            </tr>
                        `).join('');
                }
            } catch (error) {
                console.error('Error fetching users:', error);
            }
        }

        // Create new user
        document.getElementById('createUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('newUsername').value;
            const password = document.getElementById('newPassword').value;

            try {
                const response = await fetch('/auth/create-user', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    document.getElementById('userError').style.color = 'green';
                    document.getElementById('userError').textContent = 'User created successfully';
                    document.getElementById('createUserForm').reset();
                    fetchUsers();
                } else {
                    document.getElementById('userError').style.color = 'red';
                    document.getElementById('userError').textContent = data.error;
                }
            } catch (error) {
                document.getElementById('userError').style.color = 'red';
                document.getElementById('userError').textContent = 'Failed to create user';
            }
        });

        // Delete user
        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user?')) {
                return;
            }

            try {
                const response = await fetch(`/auth/delete-user/${userId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('User deleted successfully');
                    fetchUsers();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to delete user');
                }
            } catch (error) {
                alert('An error occurred while deleting the user');
            }
        }

        // Fetch pending leaves
        async function fetchPendingLeaves() {
            try {
                const response = await fetch('/leave/pending');
                if (response.ok) {
                    const leaves = await response.json();
                    const tbody = document.getElementById('pendingLeaves');
                    tbody.innerHTML = leaves.map(leave => `
                        <tr>
                            <td>${leave.user.username}</td>
                            <td>${new Date(leave.startDate).toLocaleDateString()}</td>
                            <td>${new Date(leave.endDate).toLocaleDateString()}</td>
                            <td>${leave.reason}</td>
                            <td class="status-pending">${leave.status}</td>
                            <td class="action-buttons">
                                <button class="approve" onclick="updateLeaveStatus('${leave._id}', 'approved')">Approve</button>
                                <button class="reject" onclick="updateLeaveStatus('${leave._id}', 'rejected')">Reject</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error fetching pending leaves:', error);
            }
        }

        // Update leave status
        async function updateLeaveStatus(leaveId, status) {
            try {
                const response = await fetch(`/leave/${leaveId}/status`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status })
                });

                if (response.ok) {
                    alert(`Leave ${status} successfully`);
                    fetchPendingLeaves();
                } else {
                    const data = await response.json();
                    alert(data.error || `Failed to ${status} leave`);
                }
            } catch (error) {
                alert('An error occurred. Please try again.');
            }
        }

        // Logout function
        async function logout() {
            try {
                const response = await fetch('/auth/logout', { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error('Error logging out:', error);
            }
        }

        // Initialize dashboard
        fetchUsers();
        fetchPendingLeaves();
    </script>
</body>
</html>
